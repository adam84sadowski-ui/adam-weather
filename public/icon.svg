  <line x1="146" y1="200" x2="166" y2="200" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  <line x1="346" y1="200" x2="366" y2="200" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  <line x1="178" y1="122" x2="192" y2="136" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  <line x1="320" y1="264" x2="334" y2="278" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  <line x1="334" y1="122" x2="320" y2="136" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
  <line x1="192" y1="264" x2="178" y2="278" stroke="#FFD700" stroke-width="12" stroke-linecap="round"/>
